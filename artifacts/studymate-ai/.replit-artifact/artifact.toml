kind = "mobile"
previewPath = "/"
title = "StudyMate AI"
version = "1.0.0"
id = "artifacts/studymate-ai"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 26217

[services.development]
run = "pnpm --filter @workspace/studymate-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/studymate-ai", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/studymate-ai", "run", "serve" ]

[services.env]
PORT = "26217"
BASE_PATH = "/"
